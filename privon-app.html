<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privon - Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module">
        // Firebase imports
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, doc, updateDoc, arrayUnion, getDoc, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; overflow: hidden; }
        
        .app-container { display: flex; height: 100vh; max-width: 1400px; margin: 0 auto; background: rgba(0,0,0,0.1); backdrop-filter: blur(20px); }
        
        /* Sidebar */
        .sidebar { width: 380px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; }
        .header { padding: 20px; background: rgba(255,255,255,0.15); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .profile { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; }
        .profile-info h3 { color: white; font-size: 18px; font-weight: 600; }
        .profile-info p { color: rgba(255,255,255,0.8); font-size: 14px; }
        
        .nav-tabs { display: flex; padding: 15px 20px; gap: 10px; background: rgba(255,255,255,0.05); }
        .nav-tab { flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s; color: rgba(255,255,255,0.9); font-weight: 500; }
        .nav-tab.active { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        
        .tab-content { flex: 1; overflow-y: auto; padding: 20px; }
        .conversations, .moments, .friends, .requests { display: none; }
        .conversations.active, .moments.active, .friends.active, .requests.active { display: block; }
        
        .conversation-item, .moment-item, .friend-item, .request-item { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,0.1); margin-bottom: 10px; border-radius: 16px; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); }
        .conversation-item:hover, .moment-item:hover, .friend-item:hover, .request-item:hover { background: rgba(255,255,255,0.2); transform: translateX(5px); }
        .item-avatar { width: 55px; height: 55px; border-radius: 50%; margin-right: 15px; background: linear-gradient(45deg, #ff9a9e, #fecfef); display: flex; align-items: center; justify-content: center; font-weight: 600; color: #333; }
        .item-info h4 { color: white; font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .item-info p { color: rgba(255,255,255,0.7); font-size: 14px; }
        .item-time { margin-left: auto; color: rgba(255,255,255,0.5); font-size: 12px; }
        
        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; background: rgba(255,255,255,0.15); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 15px; }
        .chat-back { background: rgba(255,255,255,0.2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s; }
        .chat-back:hover { background: rgba(255,255,255,0.3); }
        .chat-profile { display: flex; align-items: center; gap: 12px; flex: 1; }
        .chat-avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(45deg, #a8edea, #fed6e3); display: flex; align-items: center; justify-content: center; font-weight: 600; color: #333; }
        .chat-info h2 { color: white; font-size: 20px; font-weight: 600; }
        .chat-info p { color: rgba(255,255,255,0.7); font-size: 14px; }
        
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.3); }
        .message { margin-bottom: 18px; display: flex; }
        .message.sent { justify-content: flex-end; }
        .message-bubble { max-width: 70%; padding: 12px 18px; border-radius: 20px; backdrop-filter: blur(15px); }
        .message.sent .message-bubble { background: linear-gradient(45deg, #667eea, #764ba2); color: white; }
        .message.received .message-bubble { background: rgba(255,255,255,0.25); color: white; }
        .message-time { font-size: 11px; opacity: 0.7; margin-top: 4px; }
        
        .message-input { padding: 20px; background: rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 12px; align-items: flex-end; }
        .message-input input { flex: 1; padding: 15px 20px; border: none; border-radius: 25px; background: rgba(255,255,255,0.3); color: white; font-size: 16px; backdrop-filter: blur(10px); }
        .message-input input::placeholder { color: rgba(255,255,255,0.7); }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, #4ecdc4, #44a08d); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .send-btn:hover { transform: scale(1.05); }
        
        /* Moments */
        .moment-creator { background: rgba(255,255,255,0.2); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .moment-creator input { width: 100%; padding: 15px; border: none; border-radius: 15px; background: rgba(255,255,255,0.3); color: white; margin-bottom: 15px; }
        .moment-creator button { width: 100%; padding: 15px; background: linear-gradient(45deg, #ff6b6b, #ee5a52); border: none; border-radius: 15px; color: white; font-weight: 600; cursor: pointer; }
        
        /* Modals */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border-radius: 24px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal h3 { color: white; margin-bottom: 20px; text-align: center; }
        .modal button { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 12px; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(45deg, #667eea, #764ba2); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.2); color: white; }
        .btn-danger { background: linear-gradient(45deg, #ff6b6b, #ee5a52); color: white; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-radius: 25px 25px 0 0; padding: 15px; display: flex; gap: 20px; z-index: 100; }
        .nav-item { flex: 1; padding: 12px; background: rgba(255,255,255,0.15); border-radius: 15px; text-align: center; cursor: pointer; transition: all 0.3s; color: rgba(255,255,255,0.8); }
        .nav-item.active { background: rgba(255,255,255,0.3); color: white; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; max-width: 100%; }
            .sidebar { width: 100%; height: 60vh; position: absolute; z-index: 99; transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main-content { width: 100%; }
            .bottom-nav { left: 5%; width: 90%; }
        }
        
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 10px 15px; }
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: scale(1); } 30% { transform: scale(1.3); } }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="header">
                <div class="profile" onclick="openSettings()">
                    <div class="avatar" id="userAvatar">P</div>
                    <div class="profile-info">
                        <h3 id="userName">Privon User</h3>
                        <p id="userStatus">Online</p>
                    </div>
                </div>
            </div>
            
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="switchTab('chats')">Chats</div>
                <div class="nav-tab" onclick="switchTab('moments')">Moments</div>
                <div class="nav-tab" onclick="switchTab('friends')">Friends</div>
                <div class="nav-tab" onclick="switchTab('requests')">Requests</div>
            </div>
            
            <div class="tab-content">
                <div id="chats" class="conversations active">
                    <div class="conversation-item" onclick="openChat('chat1')">
                        <div class="item-avatar">J</div>
                        <div class="item-info">
                            <h4>John Doe</h4>
                            <p>Last message...</p>
                        </div>
                        <div class="item-time">2m</div>
                    </div>
                </div>
                
                <div id="moments" class="moments">
                    <div class="moment-creator">
                        <input type="text" id="momentText" placeholder="What's happening? 🌟">
                        <button onclick="postMoment()">Post Moment</button>
                    </div>
                </div>
                
                <div id="friends" class="friends">
                    <div class="friend-item">
                        <div class="item-avatar">S</div>
                        <div class="item-info">
                            <h4>Sarah Wilson</h4>
                            <p>Active 1h ago</p>
                        </div>
                    </div>
                </div>
                
                <div id="requests" class="requests">
                    <div class="request-item">
                        <div class="item-avatar">M</div>
                        <div class="item-info">
                            <h4>Mike Johnson</h4>
                            <p>New friend request</p>
                        </div>
                        <div style="display: flex; gap: 8px;">
                            <button style="padding: 8px 12px; font-size: 12px;" onclick="acceptRequest(this)">Accept</button>
                            <button style="padding: 8px 12px; font-size: 12px; background: rgba(255,0,0,0.3);" onclick="declineRequest(this)">Decline</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div class="chat-back" onclick="backToSidebar()">←</div>
                <div class="chat-profile">
                    <div class="chat-avatar" id="chatAvatar">J</div>
                    <div class="chat-info">
                        <h2 id="chatName">Chat</h2>
                        <p id="chatStatus">Online</p>
                    </div>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="message-input" id="messageInput" style="display: none;">
                <input type="text" id="messageText" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation (Mobile) -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="toggleSidebar()">Chats</div>
        <div class="nav-item" onclick="switchTab('moments')">Moments</div>
        <div class="nav-item" onclick="openSettings()">Settings</div>
    </div>
    
    <!-- Modals -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h3>Settings</h3>
            <button class="btn-primary" onclick="openPrivacy()">Privacy</button>
            <button class="btn-primary" onclick="logout()">Logout</button>
            <button class="btn-secondary" onclick="closeModal('settingsModal')">Close</button>
        </div>
    </div>
    
    <div class="modal" id="privacyModal">
        <div class="modal-content">
            <h3>Privacy Settings</h3>
            <p>Privacy options will be implemented here.</p>
            <button class="btn-secondary" onclick="closeModal('privacyModal')">Close</button>
        </div>
    </div>
    
    <script type="module">
        // Firebase Config - Replace with your config
        const firebaseConfig = {
            // Your Firebase config here
            apiKey: "your-api-key",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "your-app-id"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let currentUser = null;
        let currentChat = null;
        let chats = [];
        let moments = [];
        let friends = [];
        let requests = [];
        
        // Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('userAvatar').textContent = user.uid.slice(0,2).toUpperCase();
                document.getElementById('userName').textContent = `User ${user.uid.slice(0,6)}`;
                loadUserData();
            } else {
                signInAnonymously(auth).catch(console.error);
            }
        });
        
        async function loadUserData() {
            // Load chats
            const chatsQuery = query(collection(db, 'chats'), where('participants', 'array-contains', currentUser.uid));
            onSnapshot(chatsQuery, (snapshot) => {
                chats = [];
                snapshot.forEach(doc => chats.push({ id: doc.id, ...doc.data() }));
                renderChats();
            });
            
            // Load moments
            const momentsQuery = query(collection(db, 'moments'), orderBy('timestamp', 'desc'));
            onSnapshot(momentsQuery, (snapshot) => {
                moments = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderMoments();
            });
            
            // Load friends and requests (simplified)
            renderFriends();
            renderRequests();
        }
        
        // UI Functions
        function switchTab(tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.conversations, .moments, .friends, .requests').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
        
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }
        
        function backToSidebar() {
            document.getElementById('chatHeader').style.display = 'none';
            document.getElementById('messageInput').style.display = 'none';
            document.getElementById('messagesContainer').innerHTML = '';
            document.getElementById('sidebar').classList.remove('open');
            currentChat = null;
        }
        
        function renderChats() {
            const container = document.getElementById('chats');
            container.innerHTML = '';
            chats.forEach(chat => {
                const lastMsg = chat.messages?.[chat.messages.length - 1];
                const item = document.createElement('div');
                item.className = 'conversation-item fade-in';
                item.onclick = () => openChat(chat.id);
                item.innerHTML = `
                    <div class="item-avatar">${chat.name?.slice(0,2) || 'C'}</div>
                    <div class="item-info">
                        <h4>${chat.name || 'Chat'}</h4>
                        <p>${lastMsg?.text?.slice(0,30) || 'No messages yet'}...</p>
                    </div>
                    <div class="item-time">${lastMsg ? new Date(lastMsg.timestamp?.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</div>
                `;
                container.appendChild(item);
            });
        }
        
        function renderMoments() {
            // Moments rendered in UI already with creator
        }
        
        function renderFriends() {
            const container = document.getElementById('friends');
            // Simplified friends list
        }
        
        function renderRequests() {
            const container = document.getElementById('requests');
            // Simplified requests list
        }
        
        function openChat(chatId) {
            currentChat = chatId;
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('messageInput').style.display = 'flex';
            
            // Load chat data
            const chatDoc = doc(db, 'chats', chatId);
            const messagesQuery = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
            
            onSnapshot(messagesQuery, (snapshot) => {
                const messagesContainer = document.getElementById('messagesContainer');
                messagesContainer.innerHTML = '';
                snapshot.forEach(doc => {
                    const msg = doc.data();
                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'} fade-in`;
                    messageDiv.innerHTML = `
                        <div class="message-bubble">
                            ${msg.text}
                            <div class="message-time">${new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                        </div>
                    `;
                    messagesContainer.appendChild(messageDiv);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
            
            // Update header
            document.getElementById('chatName').textContent = `Chat ${chatId.slice(0,6)}`;
        }
        
        function sendMessage() {
            const text = document.getElementById('messageText').value.trim();
            if (!text || !currentChat) return;
            
            addDoc(collection(db, 'chats', currentChat, 'messages'), {
                text,
                senderId: currentUser.uid,
                timestamp: serverTimestamp()
            });
            
            document.getElementById('messageText').value = '';
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }
        
        async function postMoment() {
            const text = document.getElementById('momentText').value.trim();
            if (!text) return;
            
            await addDoc(collection(db, 'moments'), {
                text,
                userId: currentUser.uid,
                timestamp: serverTimestamp(),
                likes: 0,
                comments: []
            });
            
            document.getElementById('momentText').value = '';
        }
        
        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }
        
        function openPrivacy() {
            closeModal('settingsModal');
            document.getElementById('privacyModal').classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        async function logout() {
            await signOut(auth);
            window.location.reload();
        }
        
        function acceptRequest(btn) {
            btn.textContent = 'Accepted';
            btn.disabled = true;
            // Implement accept logic
        }
        
        function declineRequest(btn) {
            btn.parentElement.parentElement.remove();
            // Implement decline logic
        }
        
        // Auto-scroll messages
        setInterval(() => {
            const container = document.getElementById('messagesContainer');
            if (container) container.scrollTop = container.scrollHeight;
        }, 100);
    </script>
</body>
</html>
