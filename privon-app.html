<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>Privon — Private Messenger</title>
<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
    "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --bg-primary: #000000;
  --bg-secondary: #121212;
  --bg-tertiary: #1e1e1e;
  --bg-surface: #242424;
  --bg-card: #2a2a2a;
  --bg-input: #3a3a3a;
  
  --accent-primary: #0095f6;
  --accent-secondary: #0ea4e9;
  --accent-gradient: linear-gradient(45deg, #0095f6, #00c6ff);
  
  --green-primary: #00d4aa;
  --green-secondary: #00b894;
  
  --red-primary: #ff3b30;
  --red-secondary: #ff6b6b;
  
  --text-primary: #ffffff;
  --text-secondary: #b3b3b3;
  --text-tertiary: #8e8e8e;
  --text-muted: #6b6b6b;
  
  --border-primary: rgba(255,255,255,0.1);
  --border-secondary: rgba(255,255,255,0.05);
  
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 20px;
  --space-2xl: 24px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100dvh;
  overflow: hidden;
  position: fixed;
  width: 100%;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Animations */
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }

.fade-in { animation: fadeIn 0.3s ease-out; }
.slide-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

/* Loading Shimmer */
.shimmer {
  background: linear-gradient(90deg, var(--bg-input) 25%, #404040 50%, var(--bg-input) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

/* ── AUTH ── */
.auth-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: var(--space-xl);
  background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 149, 246, 0.1) 0%, transparent 70%);
}

.auth-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-primary);
  border-radius: var(--radius-xl);
  padding: 48px 40px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-lg);
  backdrop-filter: blur(20px);
}

.auth-logo {
  font-size: 36px;
  font-weight: 800;
  text-align: center;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  letter-spacing: -1px;
}

.auth-subtitle {
  text-align: center;
  color: var(--text-secondary);
  font-size: 15px;
  font-weight: 400;
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: var(--space-2xl);
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: var(--space-sm);
}

.form-input {
  width: 100%;
  padding: 16px 20px;
  background: var(--bg-input);
  border: 1px solid var(--border-secondary);
  border-radius: var(--radius-lg);
  color: var(--text-primary);
  font-size: 16px;
  font-weight: 400;
  font-family: inherit;
  outline: none;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.form-input:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(0, 149, 246, 0.1);
}

.form-input::placeholder {
  color: var(--text-muted);
}

.btn {
  width: 100%;
  padding: 16px;
  background: var(--accent-gradient);
  color: white;
  border: none;
  border-radius: var(--radius-lg);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.btn::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}

.btn:hover::before {
  left: 100%;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: var(--bg-input);
  border: 1px solid var(--border-primary);
  color: var(--text-primary);
}

.btn-secondary:hover {
  background: var(--bg-card);
  border-color: var(--accent-primary);
}

.auth-divider {
  display: flex;
  align-items: center;
  gap: var(--space-lg);
  color: var(--text-muted);
  font-size: 14px;
  margin: 24px 0;
}

.auth-divider::before,
.auth-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-secondary);
}

.auth-switch {
  text-align: center;
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: var(--space-lg);
}

.auth-switch-link {
  color: var(--accent-primary);
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
}

.error-message {
  color: var(--red-primary);
  font-size: 14px;
  text-align: center;
  margin-top: var(--space-md);
  min-height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

/* ── APP SHELL ── */
.app-container {
  display: none;
  height: 100dvh;
  flex-direction: column;
  overflow: hidden;
}

.status-bar {
  height: env(safe-area-inset-top);
  background: var(--bg-primary);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
}

.top-nav {
  height: 60px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-primary);
  display: flex;
  align-items: center;
  padding: 0 var(--space-xl);
  gap: var(--space-lg);
  position: sticky;
  top: env(safe-area-inset-top);
  z-index: 100;
}

.logo {
  font-size: 20px;
  font-weight: 800;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  flex: 1;
}

.user-profile {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  background: var(--bg-card);
  border: 1px solid var(--border-secondary);
  padding: 8px 12px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.user-profile:hover {
  border-color: var(--accent-primary);
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--accent-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: white;
  overflow: hidden;
  flex-shrink: 0;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-lg { width: 48px; height: 48px; font-size: 16px; }
.avatar-xl { width: 64px; height: 64px; font-size: 20px; }

/* ── SIDEBAR ── */
.main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 72px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 0;
  gap: 4px;
  flex-shrink: 0;
}

.nav-item {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-tertiary);
  font-size: 20px;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.nav-item:hover {
  background: var(--bg-surface);
  color: var(--text-primary);
}

.nav-item.active {
  background: rgba(0, 149, 246, 0.2);
  color: var(--accent-primary);
}

.badge {
  position: absolute;
  top: 4px;
  right: 4px;
  min-width: 18px;
  height: 18px;
  background: var(--red-primary);
  border-radius: 50%;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  border: 2px solid var(--bg-secondary);
}

/* ── CONTENT ── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.content-header {
  padding: var(--space-lg) var(--space-xl);
  border-bottom: 1px solid var(--border-secondary);
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  gap: var(--space-lg);
  flex-shrink: 0;
  min-height: 56px;
}

.content-title {
  font-size: 18px;
  font-weight: 700;
  flex: 1;
}

.content-body {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--border-primary) transparent;
}

.content-body::-webkit-scrollbar {
  width: 4px;
}

.content-body::-webkit-scrollbar-track {
  background: transparent;
}

.content-body::-webkit-scrollbar-thumb {
  background: var(--border-primary);
  border-radius: 2px;
}

/* Empty States */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 300px;
  color: var(--text-secondary);
  font-size: 16px;
  text-align: center;
  padding: var(--space-2xl);
  gap: var(--space-lg);
}

.empty-icon {
  font-size: 64px;
  opacity: 0.3;
}

/* ── SEARCH ── */
.search-container {
  padding: var(--space-lg) var(--space-xl) 0;
  position: sticky;
  top: 0;
  background: var(--bg-surface);
  z-index: 10;
}

.search-input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  background: var(--bg-input);
  border: 1px solid var(--border-secondary);
  border-radius: 24px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  transition: all 0.2s ease;
}

.search-input:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(0, 149, 246, 0.1);
}

.search-icon {
  position: absolute;
  left: var(--space-xl);
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-tertiary);
  font-size: 18px;
  pointer-events: none;
}

/* ── TABS ── */
.tabs {
  display: flex;
  gap: var(--space-md);
  padding: var(--space-lg) var(--space-xl);
  overflow-x: auto;
  background: var(--bg-surface);
  flex-shrink: 0;
}

.tab {
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s ease;
  border: 1px solid transparent;
  background: var(--bg-card);
  color: var(--text-secondary);
}

.tab.active,
.tab:hover {
  background: var(--accent-primary);
  color: white;
  border-color: var(--accent-primary);
  box-shadow: var(--shadow-sm);
}

/* ── CONVERSATIONS ── */
.conversations-list {
  padding: 8px var(--space-lg);
}

.conversation-item {
  display: flex;
  align-items: center;
  gap: var(--space-lg);
  padding: 16px var(--space-lg);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all 0.2s ease;
  margin-bottom: var(--space-sm);
  position: relative;
}

.conversation-item:hover {
  background: var(--bg-card);
}

.conversation-item.unread {
  background: rgba(0, 149, 246, 0.1);
}

.conversation-avatar {
  position: relative;
}

.status-dot {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 12px;
  height: 12px;
  background: var(--green-primary);
  border-radius: 50%;
  border: 2px solid var(--bg-primary);
}

.conversation-info {
  flex: 1;
  min-width: 0;
  margin-left: var(--space-sm);
}

.conversation-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-xs);
}

.conversation-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.conversation-time {
  font-size: 12px;
  color: var(--text-muted);
  font-family: monospace;
  white-space: nowrap;
}

.conversation-unread-name {
  font-weight: 700;
}

.conversation-preview {
  font-size: 14px;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.unread-badge {
  background: var(--red-primary);
  color: white;
  border-radius: 12px;
  padding: 4px 8px;
  font-size: 12px;
  font-weight: 600;
  min-width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── STORIES ── */
.stories-bar {
  display: flex;
  gap: var(--space-md);
  padding: var(--space-lg);
  background: var(--bg-surface);
  overflow-x: auto;
  flex-shrink: 0;
}

.story-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--space-sm);
  cursor: pointer;
  flex-shrink: 0;
  padding: var(--space-sm);
}

.story-ring {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(45deg, var(--accent-primary), var(--accent-secondary));
  position: relative;
  transition: all 0.2s ease;
}

.story-ring:hover {
  transform: scale(1.05);
}

.story-ring.seen {
  background: var(--border-secondary);
}

.story-ring.add-story {
  background: var(--bg-input);
  border: 2px dashed var(--border-primary);
}

.story-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  overflow: hidden;
  background: var(--bg-card);
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--bg-primary);
  font-size: 24px;
  font-weight: 300;
}

.story-inner img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.story-add-plus {
  position: absolute;
  bottom: -4px;
  right: -4px;
  width: 24px;
  height: 24px;
  background: var(--accent-primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  border: 2px solid var(--bg-primary);
}

.story-username {
  font-size: 11px;
  color: var(--text-secondary);
  max-width: 64px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: center;
}

/* ── CHAT ── */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-xl);
  display: flex;
  flex-direction: column;
  gap: var(--space-md);
  padding-bottom: 100px;
}

.message {
  display: flex;
  max-width: 70%;
  flex-direction: column;
  gap: var(--space-xs);
}

.message.sent {
  align-self: flex-end;
  align-items: flex-end;
}

.message.received {
  align-self: flex-start;
  align-items: flex-start;
}

.message-row {
  display: flex;
  align-items: flex-end;
  gap: var(--space-sm);
}

.message.sent .message-row {
  flex-direction: row-reverse;
}

.message-bubble {
  padding: 12px 18px;
  border-radius: var(--radius-xl);
  font-size: 15px;
  line-height: 1.5;
  word-break: break-word;
  max-width: 100%;
  position: relative;
}

.message.sent .message-bubble {
  background: var(--accent-gradient);
  border-bottom-right-radius: var(--radius-sm);
  box-shadow: var(--shadow-sm);
}

.message.received .message-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border-secondary);
  border-bottom-left-radius: var(--radius-sm);
}

.message-media {
  max-width: 220px;
  max-height: 220px;
  border-radius: var(--radius-md);
  cursor: pointer;
  display: block;
}

.message-video {
  max-width: 280px;
  border-radius: var(--radius-md);
}

.message-time {
  font-size: 11px;
  color: var(--text-muted);
  font-family: monospace;
  padding: 0 6px;
}

.chat-input-container {
  padding: var(--space-lg) var(--space-xl);
  padding-top: 0;
  background: var(--bg-surface);
  border-top: 1px solid var(--border-primary);
  position: sticky;
  bottom: 0;
}

.chat-input-row {
  display: flex;
  align-items: flex-end;
  gap: var(--space-lg);
  background: var(--bg-input);
  border-radius: var(--radius-xl);
  padding: 12px 20px;
  border: 1px solid var(--border-secondary);
}

.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-primary);
  font-size: 16px;
  font-family: inherit;
  outline: none;
  resize: none;
  max-height: 120px;
  line-height: 1.4;
}

.input-button {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-tertiary);
  font-size: 18px;
  transition: all 0.2s ease;
  border: none;
  background: transparent;
  flex-shrink: 0;
}

.input-button:hover {
  color: var(--text-primary);
  background: rgba(255,255,255,0.1);
}

.send-button {
  background: var(--accent-gradient);
  color: white;
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
}

.send-button:hover {
  transform: scale(1.05);
}

/* ── MOMENTS ── */
.moments-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: var(--space-lg);
  padding: var(--space-2xl);
}

.moment-card {
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  aspect-ratio: 9/16;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.moment-card:hover {
  transform: scale(1.03);
  box-shadow: var(--shadow-lg);
}

.moment-bg {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}

.moment-footer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: var(--space-md);
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}

.moment-author {
  font-size: 12px;
  font-weight: 600;
  color: white;
}

.moment-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.8);
}

.moment-anon {
  position: absolute;
  top: var(--space-sm);
  right: var(--space-sm);
  background: rgba(0,0,0,0.6);
  border-radius: var(--radius-md);
  padding: 4px 8px;
  font-size: 11px;
  color: rgba(255,255,255,0.9);
}

.expiry-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: rgba(255,255,255,0.6);
}

/* ── MODALS ── */
.modal-overlay {
  position: fixed;

  background: rgba(0,0,0,0.9);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;

}

}

.modal-card {
  background: var(--bg-surface);

  border-radius: var(--radius-xl);

}

}

/* ── NOTIFICATIONS ── */
.notification-banner {
  position: fixed;
  top: env(safe-area-inset-top);
  left: 0;
  right: 0;
  z-index: 999;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-primary);
  padding: var(--space-lg);
  display: flex;
  align-items: center;
  gap: var(--space-lg);
  transform: translateY(-100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow-md);
  border-left: 4px solid var(--accent-primary);
}

.notification-banner.show {
  transform: translateY(0);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg-surface);
  border: 1px solid var(--border-primary);
  color: var(--text-primary);
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 500;
  z-index: 1000;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  backdrop-filter: blur(20px);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-secondary);
  border-top-color: var(--accent-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── CARDS ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-secondary);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-lg);
  display: flex;
  align-items: center;
  gap: var(--space-lg);
  transition: all 0.2s ease;
}

.card:hover {
  border-color: var(--border-primary);
  background: var(--bg-surface);
}

  }
}
