<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privon — Private Messenger</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0F172A;
            color: #FFFFFF;
            min-height: 100vh;
        }

        /* Auth Section */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: #1E293B;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        .logo {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            background: linear-gradient(135deg, #FFFFFF, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .tagline {
            text-align: center;
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 32px;
        }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: #0F172A;
            border: 1px solid #334155;
            border-radius: 12px;
            color: #FFFFFF;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        input:focus, textarea:focus { border-color: #3B82F6; }
        button {
            width: 100%;
            padding: 14px;
            background: #3B82F6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 12px;
        }
        button:hover { background: #2563EB; }
        .google-btn { background: #1E293B; border: 1px solid #334155; }
        .google-btn:hover { background: #334155; }
        .divider { text-align: center; color: #64748B; margin: 16px 0; }
        .error { color: #EF4444; font-size: 14px; text-align: center; margin-top: 12px; }
        .success { color: #22C55E; }
        .hidden { display: none; }

        /* Main App */
        .app-container { display: none; height: 100vh; flex-direction: column; }
        .top-bar {
            background: #1E293B;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .top-bar .logo-small {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #FFFFFF, #3B82F6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .top-bar-right { display: flex; gap: 12px; align-items: center; position: relative; }
        .username-badge {
            background: #0F172A;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        .menu-btn {
            background: transparent;
            width: auto;
            padding: 8px 12px;
            margin: 0;
            font-size: 20px;
        }
        .dropdown-menu {
            position: absolute;
            top: 45px;
            right: 0;
            background: #1E293B;
            border-radius: 12px;
            border: 1px solid #334155;
            width: 180px;
            z-index: 100;
            display: none;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-menu a {
            display: block;
            padding: 12px 16px;
            color: white;
            text-decoration: none;
            cursor: pointer;
        }
        .dropdown-menu a:hover { background: #334155; }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 280px;
            background: #0F172A;
            border-right: 1px solid #334155;
            overflow-y: auto;
        }
        .sidebar-tab {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #1E293B;
            transition: background 0.2s;
        }
        .sidebar-tab:hover { background: #1E293B; }
        .sidebar-tab.active { background: #1E293B; border-left: 3px solid #3B82F6; }
        
        .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .content-header {
            padding: 16px 20px;
            background: #1E293B;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .content-header h2 { flex: 1; }
        .content-body { flex: 1; overflow-y: auto; padding: 20px; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .search-box input { margin-bottom: 0; flex: 1; }
        .search-box button { width: auto; padding: 14px 20px; margin: 0; }
        
        .user-card {
            background: #1E293B;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .user-card .username { font-weight: bold; }
        .user-card .email { font-size: 12px; color: #94A3B8; }
        .user-card button { width: auto; padding: 8px 16px; margin: 0; font-size: 12px; }
        
        .request-card {
            background: #1E293B;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .request-card .request-buttons { display: flex; gap: 8px; }
        .request-card button { width: auto; padding: 6px 12px; margin: 0; font-size: 12px; }
        .accept-btn { background: #22C55E; }
        .reject-btn { background: #EF4444; }
        
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
        }
        .message.sent { background: #3B82F6; align-self: flex-end; }
        .message.received { background: #1E293B; align-self: flex-start; }
        .message .text { font-size: 14px; }
        .message .time { font-size: 10px; color: #94A3B8; margin-top: 4px; }
        .message-img { max-width: 200px; max-height: 200px; border-radius: 12px; cursor: pointer; }
        .message-video { max-width: 250px; max-height: 250px; border-radius: 12px; }
        
        .chat-input-area {
            background: #1E293B;
            padding: 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #334155;
        }
        .chat-input-area input { margin-bottom: 0; flex: 1; }
        .chat-input-area button { width: auto; padding: 14px 24px; margin: 0; }
        .file-label {
            background: #3B82F6;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
        }
        .empty-state { text-align: center; color: #94A3B8; padding: 40px; }
        
        .setting-item {
            background: #1E293B;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .setting-item label { display: block; margin-bottom: 8px; font-weight: bold; }
        .delete-btn { background: #EF4444; margin-top: 20px; }
        .delete-btn:hover { background: #DC2626; }
        
        .privacy-item {
            background: #1E293B;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #334155;
            transition: 0.3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: 0.3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #3B82F6; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body>

<!-- AUTH SECTION -->
<div id="authSection" class="auth-container">
    <div class="auth-card">
        <div class="logo">PRIVON</div>
        <div class="tagline">No phone number. Just privacy.</div>
        <div id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPassword" placeholder="Password">
            <button id="loginBtn">Login →</button>
            <div class="divider">New user? <a id="showSignupLink" style="color:#3B82F6; cursor:pointer;">Create account</a></div>
        </div>
        <div id="signupForm" class="hidden">
            <input type="text" id="signupUsername" placeholder="Username (e.g., @alex)">
            <input type="email" id="signupEmail" placeholder="Email">
            <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
            <button id="signupBtn">Create Account →</button>
            <div class="divider">Already have account? <a id="showLoginLink" style="color:#3B82F6; cursor:pointer;">Login</a></div>
        </div>
        <div class="divider">or</div>
        <button id="googleBtn" class="google-btn">Continue with Google</button>
        <div id="authError" class="error"></div>
    </div>
</div>

<!-- MAIN APP -->
<div id="appContainer" class="app-container">
    <div class="top-bar">
        <div class="logo-small">PRIVON</div>
        <div class="top-bar-right">
            <span id="navUsername" class="username-badge"></span>
            <button id="menuBtn" class="menu-btn">⋮</button>
            <div id="dropdownMenu" class="dropdown-menu">
                <a id="menuPrivacy">🔐 Privacy</a>
                <a id="menuSettings">⚙️ Settings</a>
                <a id="menuLogout">🚪 Logout</a>
            </div>
        </div>
    </div>
    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-tab" data-tab="convos">💬 Convos</div>
            <div class="sidebar-tab" data-tab="peps">👥 Peps</div>
            <div class="sidebar-tab" data-tab="search">🔍 Search</div>
            <div class="sidebar-tab" data-tab="requests">📬 Requests</div>
        </div>
        <div class="content-area">
            <div id="contentHeader" class="content-header"><h2>Convos</h2></div>
            <div id="contentBody" class="content-body"><div class="empty-state">Select a conversation</div></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, updateProfile } from "firebase/auth";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, where, addDoc, updateDoc, deleteDoc, onSnapshot, orderBy, serverTimestamp, arrayUnion, arrayRemove } from "firebase/firestore";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "firebase/storage";

    const firebaseConfig = {
        apiKey: "AIzaSyDdC1U5W38AtRzwyxc5JWdWLR67SR1rLx0",
        authDomain: "privon-web-chat.firebaseapp.com",
        projectId: "privon-web-chat",
        storageBucket: "privon-web-chat.firebasestorage.app",
        messagingSenderId: "487526066785",
        appId: "1:487526066785:web:80ba45988afd4f3a7ad820"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let currentChatUser = null;
    let unsubscribeMessages = null;

    // DOM Elements
    const authSection = document.getElementById('authSection');
    const appContainer = document.getElementById('appContainer');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const googleBtn = document.getElementById('googleBtn');
    const authError = document.getElementById('authError');
    const navUsername = document.getElementById('navUsername');
    const contentHeader = document.getElementById('contentHeader');
    const contentBody = document.getElementById('contentBody');
    const showSignupLink = document.getElementById('showSignupLink');
    const showLoginLink = document.getElementById('showLoginLink');
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    const menuPrivacy = document.getElementById('menuPrivacy');
    const menuSettings = document.getElementById('menuSettings');
    const menuLogout = document.getElementById('menuLogout');

    // Dropdown menu
    menuBtn.addEventListener('click', () => dropdownMenu.classList.toggle('show'));
    document.addEventListener('click', (e) => {
        if (!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
            dropdownMenu.classList.remove('show');
        }
    });

    // Toggle forms
    showSignupLink.addEventListener('click', () => {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        authError.textContent = '';
    });
    showLoginLink.addEventListener('click', () => {
        signupForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        authError.textContent = '';
    });

    async function saveUserToFirestore(userId, email, username) {
        await setDoc(doc(db, 'users', userId), {
            email: email,
            username: username,
            createdAt: serverTimestamp(),
            friends: [],
            privacy: { lastSeen: true, readReceipts: true }
        }, { merge: true });
    }

    async function getUserByUsername(username) {
        const q = query(collection(db, 'users'), where('username', '==', username));
        const querySnapshot = await getDocs(q);
        if (!querySnapshot.empty) {
            const doc = querySnapshot.docs[0];
            return { id: doc.id, ...doc.data() };
        }
        return null;
    }

    async function getUserById(userId) {
        const userDoc = await getDoc(doc(db, 'users', userId));
        if (userDoc.exists()) return { id: userDoc.id, ...userDoc.data() };
        return null;
    }

    async function sendFriendRequest(toUserId, toUsername) {
        const requestId = `${currentUser.uid}_${toUserId}`;
        await setDoc(doc(db, 'friendRequests', requestId), {
            fromUserId: currentUser.uid,
            fromUsername: currentUser.username,
            toUserId: toUserId,
            toUsername: toUsername,
            status: 'pending',
            createdAt: serverTimestamp()
        });
    }

    async function acceptFriendRequest(requestId, fromUserId, toUserId) {
        await updateDoc(doc(db, 'users', fromUserId), { friends: arrayUnion(toUserId) });
        await updateDoc(doc(db, 'users', toUserId), { friends: arrayUnion(fromUserId) });
        await deleteDoc(doc(db, 'friendRequests', requestId));
    }

    async function rejectFriendRequest(requestId) {
        await deleteDoc(doc(db, 'friendRequests', requestId));
    }

    async function sendMessage(toUserId, text, mediaUrl = null, mediaType = null) {
        const chatId = [currentUser.uid, toUserId].sort().join('_');
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
            text: text || '',
            mediaUrl: mediaUrl,
            mediaType: mediaType,
            senderId: currentUser.uid,
            senderName: currentUser.username,
            timestamp: serverTimestamp()
        });
    }

    async function uploadMedia(file) {
        const storageRef = ref(storage, `media/${Date.now()}_${file.name}`);
        await uploadBytes(storageRef, file);
        return await getDownloadURL(storageRef);
    }

    async function loadConvosList() {
        contentHeader.innerHTML = '<h2>Convos</h2>';
        contentBody.innerHTML = '<div class="empty-state">Loading...</div>';
        const friends = currentUser.friends || [];
        if (friends.length === 0) {
            contentBody.innerHTML = '<div class="empty-state">No conversations yet. Add friends to start chatting!</div>';
            return;
        }
        let html = '';
        for (const friendId of friends) {
            const friend = await getUserById(friendId);
            if (friend) {
                html += `<div class="user-card" data-userid="${friend.id}" data-username="${friend.username}">
                    <div><div class="username">${friend.username}</div></div>
                    <button class="chat-btn">Chat</button>
                </div>`;
            }
        }
        contentBody.innerHTML = html;
        document.querySelectorAll('.chat-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const card = btn.closest('.user-card');
                openChat(card.dataset.userid, card.dataset.username);
            });
        });
    }

    function openChat(userId, username) {
        currentChatUser = { id: userId, username: username };
        contentHeader.innerHTML = `<h2>Chat with ${username}</h2><button id="backToConvos" style="width:auto; padding:6px 12px;">← Back</button>`;
        document.getElementById('backToConvos')?.addEventListener('click', () => { loadConvosList(); if(unsubscribeMessages) unsubscribeMessages(); currentChatUser = null; });
        contentBody.innerHTML = `<div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-area">
                <label class="file-label">📎<input type="file" id="mediaInput" accept="image/*,video/*" style="display:none"></label>
                <input type="text" id="chatMessageInput" placeholder="Type a message...">
                <button id="sendChatBtn">Send</button>
            </div>`;
        const chatId = [currentUser.uid, userId].sort().join('_');
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        if (unsubscribeMessages) unsubscribeMessages();
        unsubscribeMessages = onSnapshot(q, (snapshot) => {
            const messagesDiv = document.getElementById('chatMessages');
            if (!messagesDiv) return;
            messagesDiv.innerHTML = '';
            snapshot.forEach(doc => {
                const msg = doc.data();
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
                if (msg.mediaUrl && msg.mediaType === 'video') {
                    const video = document.createElement('video');
                    video.src = msg.mediaUrl;
                    video.controls = true;
                    video.className = 'message-video';
                    msgDiv.appendChild(video);
                } else if (msg.mediaUrl) {
                    const img = document.createElement('img');
                    img.src = msg.mediaUrl;
                    img.className = 'message-img';
                    img.onclick = () => window.open(msg.mediaUrl);
                    msgDiv.appendChild(img);
                }
                if (msg.text) {
                    const textSpan = document.createElement('div');
                    textSpan.className = 'text';
                    textSpan.textContent = msg.text;
                    msgDiv.appendChild(textSpan);
                }
                const timeSpan = document.createElement('div');
                timeSpan.className = 'time';
                if (msg.timestamp) timeSpan.textContent = msg.timestamp.toDate().toLocaleTimeString();
                msgDiv.appendChild(timeSpan);
                messagesDiv.appendChild(msgDiv);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
        const sendBtn = document.getElementById('sendChatBtn');
        const messageInput = document.getElementById('chatMessageInput');
        const mediaInput = document.getElementById('mediaInput');
        sendBtn.addEventListener('click', async () => {
            const text = messageInput.value.trim();
            if (text) { await sendMessage(userId, text); messageInput.value = ''; }
        });
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendBtn.click(); });
        mediaInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const mediaUrl = await uploadMedia(file);
                const mediaType = file.type.startsWith('video') ? 'video' : 'image';
                await sendMessage(userId, '', mediaUrl, mediaType);
                mediaInput.value = '';
            }
        });
    }

    async function loadPeps() {
        contentHeader.innerHTML = '<h2>👥 Peps</h2>';
        const friends = currentUser.friends || [];
        if (friends.length === 0) { contentBody.innerHTML = '<div class="empty-state">No friends yet. Search and add people!</div>'; return; }
        let html = '';
        for (const friendId of friends) {
            const friend = await getUserById(friendId);
            if (friend) html += `<div class="user-card"><div><div class="username">${friend.username}</div></div><button class="chat-from-peps" data-userid="${friend.id}" data-username="${friend.username}">Chat</button></div>`;
        }
        contentBody.innerHTML = html;
        document.querySelectorAll('.chat-from-peps').forEach(btn => {
            btn.addEventListener('click', () => openChat(btn.dataset.userid, btn.dataset.username));
        });
    }

    async function loadSearch() {
        contentHeader.innerHTML = '<h2>🔍 Search Users</h2>';
        contentBody.innerHTML = `<div class="search-box"><input type="text" id="searchInput" placeholder="Search by username (e.g., @alex)"><button id="searchBtn">Search</button></div><div id="searchResults"></div>`;
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const searchTerm = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');
            if (!searchTerm) { resultsDiv.innerHTML = '<div class="empty-state">Enter a username</div>'; return; }
            const user = await getUserByUsername(searchTerm);
            if (!user || user.id === currentUser.uid) { resultsDiv.innerHTML = '<div class="empty-state">No user found</div>'; return; }
            const isFriend = currentUser.friends?.includes(user.id);
            const requestDoc = await getDoc(doc(db, 'friendRequests', `${currentUser.uid}_${user.id}`));
            const isRequestSent = requestDoc.exists();
            resultsDiv.innerHTML = `<div class="user-card"><div><div class="username">${user.username}</div><div class="email">${user.email}</div></div>
                ${!isFriend && !isRequestSent ? `<button id="addFriendBtn">Add Friend</button>` : isRequestSent ? '<span style="color:#22C55E;">Request sent</span>' : '<span style="color:#22C55E;">Friend</span>'}</div>`;
            if (!isFriend && !isRequestSent) {
                document.getElementById('addFriendBtn')?.addEventListener('click', async () => {
                    await sendFriendRequest(user.id, user.username);
                    resultsDiv.innerHTML = '<div class="empty-state">Friend request sent!</div>';
                });
            }
        });
    }

    async function loadRequests() {
        contentHeader.innerHTML = '<h2>📬 Friend Requests</h2>';
        contentBody.innerHTML = '<div class="empty-state">Loading...</div>';
        const q = query(collection(db, 'friendRequests'), where('toUserId', '==', currentUser.uid), where('status', '==', 'pending'));
        const snapshot = await getDocs(q);
        if (snapshot.empty) { contentBody.innerHTML = '<div class="empty-state">No pending requests</div>'; return; }
        let html = '';
        snapshot.forEach(doc => {
            const req = doc.data();
            html += `<div class="request-card" data-requestid="${doc.id}" data-fromuserid="${req.fromUserId}">
                <div><div class="username">${req.fromUsername}</div></div>
                <div class="request-buttons"><button class="accept-btn">Accept</button><button class="reject-btn">Reject</button></div>
            </div>`;
        });
        contentBody.innerHTML = html;
        document.querySelectorAll('.accept-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const card = btn.closest('.request-card');
                await acceptFriendRequest(card.dataset.requestid, card.dataset.fromuserid, currentUser.uid);
                loadRequests();
            });
        });
        document.querySelectorAll('.reject-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const card = btn.closest('.request-card');
                await rejectFriendRequest(card.dataset.requestid);
                loadRequests();
            });
        });
    }

    function loadSettings() {
        contentHeader.innerHTML = '<h2>⚙️ Settings</h2>';
        contentBody.innerHTML = `<div class="setting-item"><label>Username</label><input type="text" id="settingsUsername" value="${currentUser.username}"><button id="updateUsernameBtn">Update Username</button></div>
            <div class="setting-item"><label>Email</label><input type="email" id="settingsEmail" value="${currentUser.email}" disabled></div>
            <button id="deleteAccountBtn" class="delete-btn">Delete Account</button>`;
        document.getElementById('updateUsernameBtn')?.addEventListener('click', async () => {
            const newUsername = document.getElementById('settingsUsername').value.trim();
            if (newUsername && newUsername.startsWith('@')) {
                await updateDoc(doc(db, 'users', currentUser.uid), { username: newUsername });
                currentUser.username = newUsername;
                navUsername.textContent = newUsername;
                alert('Username updated!');
            } else alert('Username must start with @');
        });
        document.getElementById('deleteAccountBtn')?.addEventListener('click', async () => {
            if (confirm('Delete account permanently?')) {
                await deleteDoc(doc(db, 'users', currentUser.uid));
                await auth.currentUser.delete();
                signOut(auth);
            }
        });
    }

    function loadPrivacy() {
        contentHeader.innerHTML = '<h2>🔐 Privacy</h2>';
        const privacy = currentUser.privacy || { lastSeen: true, readReceipts: true };
        contentBody.innerHTML = `<div class="privacy-item"><span>Show Last Seen</span><label class="switch"><input type="checkbox" id="lastSeenToggle" ${privacy.lastSeen ? 'checked' : ''}><span class="slider"></span></label></div>
            <div class="privacy-item"><span>Read Receipts</span><label class="switch"><input type="checkbox" id="readReceiptsToggle" ${privacy.readReceipts ? 'checked' : ''}><span class="slider"></span></label></div>`;
        document.getElementById('lastSeenToggle')?.addEventListener('change', async (e) => {
            await updateDoc(doc(db, 'users', currentUser.uid), { privacy: { ...privacy, lastSeen: e.target.checked } });
        });
        document.getElementById('readReceiptsToggle')?.addEventListener('change', async (e) => {
            await updateDoc(doc(db, 'users', currentUser.uid), { privacy: { ...privacy, readReceipts: e.target.checked } });
        });
    }

    // Menu actions
    menuPrivacy.addEventListener('click', () => { loadPrivacy(); dropdownMenu.classList.remove('show'); });
    menuSettings.addEventListener('click', () => { loadSettings(); dropdownMenu.classList.remove('show'); });
    menuLogout.addEventListener('click', async () => { await signOut(auth); if(unsubscribeMessages) unsubscribeMessages(); });

    // Tab navigation
    document.querySelectorAll('.sidebar-tab').forEach(tab => {
        tab.addEventListener('click', async () => {
            document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            if (tabName === 'convos') await loadConvosList();
            else if (tabName === 'peps') await loadPeps();
            else if (tabName === 'search') await loadSearch();
            else if (tabName === 'requests') await loadRequests();
        });
    });

    // Signup
    signupBtn.addEventListener('click', async () => {
        const username = document.getElementById('signupUsername').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        if (!username || !email || !password) { authError.textContent = 'All fields required'; return; }
        if (!username.startsWith('@')) { authError.textContent = 'Username must start with @'; return; }
        if (password.length < 6) { authError.textContent = 'Password must be at least 6 characters'; return; }
        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await saveUserToFirestore(userCredential.user.uid, email, username);
        } catch (error) { authError.textContent = error.message; }
    });

    // Login
    loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { authError.textContent = 'Email and password required'; return; }
        try { await signInWithEmailAndPassword(auth, email, password); } 
        catch (error) { authError.textContent = error.message; }
    });

    // Google login
    googleBtn.addEventListener('click', async () => {
        try {
            const result = await signInWithPopup(auth, googleProvider);
            const userDoc = await getDoc(doc(db, 'users', result.user.uid));
            if (!userDoc.exists()) {
                const username = '@' + result.user.email.split('@')[0];
                await saveUserToFirestore(result.user.uid, result.user.email, username);
            }
        } catch (error) { authError.textContent = error.message; }
    });

    // Auth state
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            if (userDoc.exists()) {
                currentUser = { id: user.uid, ...userDoc.data() };
                navUsername.textContent = currentUser.username;
                authSection.style.display = 'none';
                appContainer.style.display = 'flex';
                document.querySelector('.sidebar-tab[data-tab="convos"]').click();
            }
        } else {
            authSection.style.display = 'flex';
            appContainer.style.display = 'none';
            currentUser = null;
            if (unsubscribeMessages) unsubscribeMessages();
        }
    });
</script>
</body>
</html>
